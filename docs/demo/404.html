    <title>银发守护</title>
    <script>
      // GitHub Pages SPA fallback: store the attempted path and redirect to index
      sessionStorage.setItem('gh-pages-redirect', window.location.pathname + window.location.search + window.location.hash);
      var repo = '/silver-guardian-v2/demo/';
      window.location.replace(repo);
    </script>
  </head>
